<!-- app/static/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI App Compiler</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; padding: 40px 20px; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { font-size: 2rem; color: #7c6af7; margin-bottom: 8px; }
    p.subtitle { color: #888; margin-bottom: 32px; }
    textarea { width: 100%; height: 120px; background: #1e2130; border: 1px solid #333; border-radius: 8px; color: #e0e0e0; padding: 14px; font-size: 15px; resize: vertical; }
    button { margin-top: 12px; padding: 12px 32px; background: #7c6af7; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    button:hover { background: #6a57e0; }
    button:disabled { background: #444; cursor: not-allowed; }
    .status { margin-top: 20px; padding: 12px 16px; border-radius: 8px; font-size: 14px; }
    .status.loading { background: #1e2130; color: #aaa; }
    .status.success { background: #0d2e1a; color: #4caf82; border: 1px solid #2a6644; }
    .status.error { background: #2e0d0d; color: #f47c7c; border: 1px solid #6e2020; }
    .section { margin-top: 24px; }
    .section h3 { font-size: 1rem; color: #7c6af7; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    pre { background: #1e2130; border: 1px solid #2a2d3e; border-radius: 8px; padding: 16px; overflow-x: auto; font-size: 13px; line-height: 1.6; white-space: pre-wrap; }
    .meta { display: flex; gap: 20px; margin-top: 16px; flex-wrap: wrap; }
    .meta-item { background: #1e2130; border-radius: 8px; padding: 12px 20px; text-align: center; }
    .meta-item .value { font-size: 1.5rem; color: #7c6af7; font-weight: bold; }
    .meta-item .label { font-size: 0.75rem; color: #888; margin-top: 4px; }
    .tag { display: inline-block; background: #2a2d3e; color: #aaa; padding: 4px 10px; border-radius: 4px; font-size: 12px; margin: 3px; }
    .tag.warning { background: #2e2000; color: #f0a500; }
    .tag.error { background: #2e0d0d; color: #f47c7c; }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚙️ AI App Compiler</h1>
    <p class="subtitle">Natural language → structured schema → executable app</p>

    <textarea id="prompt" placeholder="Describe your app... e.g. Build a CRM with login, contacts, dashboard, role-based access, and premium plan with payments."></textarea>
    <button id="compileBtn" onclick="compile()">Compile App</button>

    <div id="statusBox" style="display:none"></div>
    <div id="metaBox" style="display:none" class="meta"></div>
    <div id="assumptionsBox" style="display:none" class="section"></div>
    <div id="errorsBox" style="display:none" class="section"></div>
    <div id="irBox" style="display:none" class="section"></div>
    <div id="designBox" style="display:none" class="section"></div>
    <div id="schemaBox" style="display:none" class="section"></div>
    <div id="runtimeBox" style="display:none" class="section"></div>
  </div>

  <script>
    async function compile() {
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) return alert('Please enter a prompt.');

      const btn = document.getElementById('compileBtn');
      btn.disabled = true;
      btn.textContent = 'Compiling...';

      showStatus('loading', '⏳ Running pipeline: Intent → Design → Schema → Validation → Runtime...');
      hideAll();

      try {
        const res = await fetch('/compile', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });
        const data = await res.json();

        if (!res.ok) {
          showStatus('error', `❌ Error: ${JSON.stringify(data.detail)}`);
          return;
        }

        showStatus('success', `✅ Compiled successfully in ${data.latency_seconds}s`);

        // Meta stats
        const schema = data.final_schema;
        document.getElementById('metaBox').style.display = 'flex';
        document.getElementById('metaBox').innerHTML = `
          <div class="meta-item"><div class="value">${Object.keys(schema.db_tables||{}).length}</div><div class="label">DB Tables</div></div>
          <div class="meta-item"><div class="value">${(schema.api_endpoints||[]).length}</div><div class="label">API Endpoints</div></div>
          <div class="meta-item"><div class="value">${(schema.ui_pages||[]).length}</div><div class="label">UI Pages</div></div>
          <div class="meta-item"><div class="value">${data.runtime_report.generated?.length||0}</div><div class="label">Artifacts</div></div>
          <div class="meta-item"><div class="value">${data.latency_seconds}s</div><div class="label">Latency</div></div>
        `;

        // Assumptions
        if (data.assumptions?.length) {
          document.getElementById('assumptionsBox').style.display = 'block';
          document.getElementById('assumptionsBox').innerHTML = `
            <h3>💡 Assumptions Made</h3>
            ${data.assumptions.map(a => `<span class="tag warning">${a}</span>`).join('')}
          `;
        }

        // Errors
        if (data.errors?.length) {
          document.getElementById('errorsBox').style.display = 'block';
          document.getElementById('errorsBox').innerHTML = `
            <h3>⚠️ Validation Errors</h3>
            ${data.errors.map(e => `<span class="tag error">${e}</span>`).join('')}
          `;
        }

        showSection('irBox', '📋 Intent IR', data.intent_ir);
        showSection('designBox', '🏗️ System Design', data.system_design);
        showSection('schemaBox', '📐 Final Schema', data.final_schema);
        showSection('runtimeBox', '⚡ Runtime Report', data.runtime_report);

      } catch (err) {
        showStatus('error', `❌ Network error: ${err.message}`);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Compile App';
      }
    }

    function showStatus(type, msg) {
      const box = document.getElementById('statusBox');
      box.style.display = 'block';
      box.className = `status ${type}`;
      box.textContent = msg;
    }

    function showSection(id, title, data) {
      const box = document.getElementById(id);
      box.style.display = 'block';
      box.innerHTML = `<h3>${title}</h3><pre>${JSON.stringify(data, null, 2)}</pre>`;
    }

    function hideAll() {
      ['metaBox','assumptionsBox','errorsBox','irBox','designBox','schemaBox','runtimeBox']
        .forEach(id => document.getElementById(id).style.display = 'none');
    }
  </script>
</body>
</html>
